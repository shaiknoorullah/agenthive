# https://github.com/evilmartians/lefthook

commit-msg:
  commands:
    conventional-commit:
      run: cog verify --file {1}

pre-commit:
  parallel: true
  commands:
    go-vet:
      glob: "*.go"
      run: go vet ./...
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run

pre-push:
  commands:
    tests:
      run: go test -race -count=1 ./...
