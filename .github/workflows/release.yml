name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip if this push is from a release commit (prevent infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          git config user.signingkey "$GPG_KEY_ID"
          git config commit.gpgsign true
          git config tag.gpgsign true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute version
        id: version
        run: |
          VERSION=$(git cliff --bumped-version 2>/dev/null || echo "v0.1.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Generate changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git cliff --tag "$VERSION" --output CHANGELOG.md
          git cliff --latest --tag "$VERSION" --strip header > RELEASE_NOTES.md

      - name: Commit changelog and create tag
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git add CHANGELOG.md
          git commit -S -m "chore(release): $VERSION"
          git tag -s "$VERSION" -m "Release $VERSION"
          git push origin main --tags

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
