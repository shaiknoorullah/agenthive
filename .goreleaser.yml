version: 2
project_name: agenthive
before:
  hooks:
    - go mod tidy
builds:
  - id: agenthive
    main: ./cmd/agenthive
    binary: agenthive
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]
archives:
  - id: agenthive
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [LICENSE, README.md, SECURITY.md, tmux/**/*]
checksum:
  name_template: "checksums.txt"
  algorithm: sha256
release:
  github:
    owner: shaiknoorullah
    name: agenthive
  draft: false
  prerelease: auto
changelog:
  use: github
  sort: asc
  filters:
    exclude: ['^chore:', '^docs:', '^test:']
